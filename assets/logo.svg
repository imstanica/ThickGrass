<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a7a4c"/>
      <stop offset="100%" stop-color="#0d5132"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#eafff2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- three grass blades -->
  <path d="M 64 100 C 60 78 62 58 50 30 C 66 46 70 70 66 100 Z" fill="url(#blade)"/>
  <path d="M 50 100 C 44 82 40 66 24 46 C 44 54 52 74 56 100 Z" fill="url(#blade)" opacity="0.92"/>
  <path d="M 78 100 C 82 82 88 64 104 44 C 84 54 74 74 70 100 Z" fill="url(#blade)" opacity="0.92"/>

  <!-- ticket notch accent on the center blade tip -->
  <circle cx="50" cy="30" r="6" fill="#f4b942"/>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="none" stroke="#0a3d26" stroke-width="1" opacity="0.4"/>
</svg>
